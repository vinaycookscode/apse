<!DOCTYPE html>
<html>
<head>
  <title>Logo Preview</title>
  <style>
    body { 
      margin: 0; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh;
      background: #f5a623;
      font-family: sans-serif;
    }
    .container {
      background: #f5a623;
      padding: 60px;
      border-radius: 16px;
    }
    .white-bg {
      background: #fff;
      padding: 60px;
      border-radius: 16px;
      margin-top: 40px;
    }
    h2 { text-align: center; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div>
    <div class="container">
      <h2>On Yellow Background (matching reference)</h2>
      <img src="energy-saving-solutions-logo.svg" alt="Energy Saving Solutions Logo" style="max-width: 600px;">
    </div>
    <div class="white-bg">
      <h2>On White Background</h2>
      <img src="energy-saving-solutions-logo.svg" alt="Energy Saving Solutions Logo" style="max-width: 600px;">
    </div>
  </div>
</body>
</html>
